name: Daily Fund Sync

on:
  schedule:
    - cron: '0 21 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write Gmail token
        run: echo "$GMAIL_TOKEN_JSON" > token.json
        env:
          GMAIL_TOKEN_JSON: ${{ secrets.GMAIL_TOKEN_JSON }}

      - name: Step 1 - Morningstar 펀드 동기화
        run: python scripts/fetch_morningstar_funds.py
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          REDASH_URL: ${{ secrets.REDASH_URL }}
          REDASH_API_KEY: ${{ secrets.REDASH_API_KEY }}
          FSC_API_KEY: ${{ secrets.FSC_API_KEY }}
          SECRET_KEY: ${{ secrets.SECRET_KEY }}

      - name: Step 2 - ETF 동기화
        run: python scripts/sync_etf.py
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          REDASH_URL: ${{ secrets.REDASH_URL }}
          REDASH_API_KEY: ${{ secrets.REDASH_API_KEY }}
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
